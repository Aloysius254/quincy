<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Gallery 🌙</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap');

    * { margin:0;padding:0;box-sizing:border-box; }
    :root {
      --gold:#c9a96e;--gold-light:#e8c98a;
      --bg:#0a0a0f;--surface:#12121a;--border:#1e1e2a;
      --text:#e8e0d5;--muted:#6a6070;--soft:#9a9090;
    }
    body { background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden; }

    /* Stars */
    #stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
    .star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d) ease-in-out infinite;opacity:0;}
    @keyframes twinkle{0%,100%{opacity:0}50%{opacity:var(--o)}}

    .page{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:40px 20px 100px;}

    /* Header */
    .gallery-header{text-align:center;padding:40px 0 48px;}
    .back-btn{
      display:inline-flex;align-items:center;gap:8px;
      color:var(--muted);font-size:0.8rem;letter-spacing:1px;
      text-decoration:none;transition:color 0.2s;margin-bottom:32px;
    }
    .back-btn:hover{color:var(--gold);}
    .gallery-header h1{
      font-family:'Playfair Display',serif;
      font-size:clamp(2rem,6vw,3.5rem);
      background:linear-gradient(135deg,#e8e0d5,var(--gold),#e8e0d5);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      margin-bottom:12px;
    }
    .gallery-header p{font-family:'Playfair Display',serif;font-style:italic;color:var(--soft);font-size:1rem;}

    /* Gold line */
    .gold-line{width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:24px auto 40px;}

    /* Grid */
    .photo-grid{
      columns:2;column-gap:16px;
    }
    @media(min-width:600px){.photo-grid{columns:3;}}

    .photo-item{
      break-inside:avoid;margin-bottom:16px;
      background:linear-gradient(145deg,#1a1520,#12101a);
      border:1px solid #2e2840;border-radius:12px;
      overflow:hidden;position:relative;
      transition:transform 0.3s,box-shadow 0.3s;
      cursor:default;
    }
    .photo-item:hover{
      transform:translateY(-4px);
      box-shadow:0 12px 36px rgba(0,0,0,0.5),0 0 0 1px rgba(201,169,110,0.15);
    }
    .photo-item img{width:100%;display:block;object-fit:cover;}
    .photo-caption{
      padding:10px 12px 12px;
      font-family:'Playfair Display',serif;font-style:italic;
      font-size:0.78rem;color:var(--gold);line-height:1.5;opacity:0.85;
    }
    .photo-date{
      padding:0 12px 10px;
      font-size:0.68rem;color:var(--muted);letter-spacing:1px;
    }

    /* Delete btn */
    .photo-delete{
      position:absolute;top:8px;right:8px;
      width:26px;height:26px;border-radius:50%;
      background:rgba(10,10,15,0.85);border:1px solid #3a2a3a;
      color:#6a4a6a;font-size:0.7rem;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      opacity:0;transition:opacity 0.2s,color 0.2s,border-color 0.2s;
    }
    .photo-item:hover .photo-delete{opacity:1;}
    .photo-delete:hover{color:#e05a5a;border-color:#e05a5a;}

    /* Add photo card */
    .add-card{
      break-inside:avoid;margin-bottom:16px;
      background:transparent;border:2px dashed #2e2840;
      border-radius:12px;min-height:160px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:10px;cursor:pointer;transition:all 0.3s;padding:20px;
    }
    .add-card:hover{border-color:var(--gold);box-shadow:0 8px 24px rgba(201,169,110,0.1);}
    .add-card .add-icon{font-size:1.8rem;opacity:0.4;transition:opacity 0.2s;}
    .add-card:hover .add-icon{opacity:0.8;}
    .add-card .add-label{font-family:'Playfair Display',serif;font-style:italic;font-size:0.75rem;color:var(--muted);text-align:center;transition:color 0.2s;}
    .add-card:hover .add-label{color:var(--gold);}

    /* Empty state */
    .empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
    .empty-state .empty-icon{font-size:3rem;margin-bottom:16px;opacity:0.4;}
    .empty-state p{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;line-height:1.7;}

    /* Caption modal */
    .modal-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,0.8);
      z-index:200;display:flex;align-items:center;justify-content:center;
      padding:24px;opacity:0;pointer-events:none;transition:opacity 0.3s;
    }
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal{
      background:#12121a;border:1px solid #2e2840;border-radius:20px;
      padding:32px 28px;max-width:360px;width:100%;
      transform:translateY(20px);transition:transform 0.3s;
    }
    .modal-overlay.open .modal{transform:translateY(0);}
    .modal h4{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--text);margin-bottom:8px;}
    .modal p{font-size:0.8rem;color:var(--muted);margin-bottom:20px;line-height:1.5;}
    .caption-input{
      width:100%;background:#0a0a0f;border:1px solid #2e2840;
      border-radius:10px;padding:12px 14px;color:var(--text);
      font-family:'Playfair Display',serif;font-style:italic;
      font-size:0.9rem;resize:none;outline:none;
      transition:border-color 0.2s;margin-bottom:16px;
    }
    .caption-input:focus{border-color:var(--gold);}
    .caption-input::placeholder{color:var(--muted);}
    .modal-btns{display:flex;gap:10px;}
    .confirm-btn{
      flex:1;background:linear-gradient(135deg,#c9a96e,#a07840);
      color:#0a0a0f;border:none;padding:12px;border-radius:50px;
      font-size:0.9rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;
    }
    .skip-btn{
      flex:1;background:transparent;border:1px solid #2e2840;
      color:var(--muted);padding:12px;border-radius:50px;
      font-size:0.9rem;cursor:pointer;font-family:'Inter',sans-serif;
      transition:border-color 0.2s,color 0.2s;
    }
    .skip-btn:hover{border-color:var(--gold);color:var(--gold);}

    /* Music btn */
    .music-btn{
      position:fixed;bottom:28px;right:28px;z-index:100;
      width:48px;height:48px;border-radius:50%;
      background:var(--surface);border:1px solid var(--border);
      color:var(--gold);font-size:1.2rem;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:all 0.25s;box-shadow:0 4px 20px rgba(0,0,0,0.4);
    }
    .music-btn.playing{border-color:var(--gold);background:linear-gradient(135deg,#1e1a12,#2a2010);}
    .music-btn.playing::before{
      content:'';position:absolute;width:100%;height:100%;
      border-radius:50%;border:1px solid var(--gold);
      animation:pulse-ring 2s ease-out infinite;
    }
    @keyframes pulse-ring{0%{transform:scale(1);opacity:0.6}100%{transform:scale(1.7);opacity:0}}
  </style>
</head>
<body>
<div id="stars"></div>

<div class="page">
  <div class="gallery-header">
    <div><a class="back-btn" href="index.html">← back to Quincy</a></div>
    <h1>Our Gallery</h1>
    <p>moments worth keeping 🌙</p>
    <div class="gold-line"></div>
  </div>

  <div class="photo-grid" id="photoGrid">
    <!-- Aloy's photos — always pinned first -->
    <div class="photo-item">
      <img src="quincy.jpeg" alt="Quincy" />
      <div class="photo-caption">the moment I knew you were different</div>
    </div>
    <div class="photo-item">
      <img src="pencil image.jpeg" alt="Quincy sketch" style="filter:grayscale(100%) contrast(1.15)" />
      <div class="photo-caption">even in lines and shadows, still you</div>
    </div>
    <!-- Add card -->
    <div class="add-card" id="addCard">
      <div class="add-icon">📷</div>
      <div class="add-label">add a photo</div>
    </div>
  </div>

  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="empty-icon">🌙</div>
    <p>No photos yet.<br/>Be the first to add one.</p>
  </div>
</div>

<!-- Caption modal -->
<div class="modal-overlay" id="captionModal">
  <div class="modal">
    <h4>Add a caption 🌙</h4>
    <p>Write something for this photo — or skip for the default.</p>
    <textarea class="caption-input" id="captionInput" rows="3" maxlength="120" placeholder="e.g. this one got me..."></textarea>
    <div class="modal-btns">
      <button class="confirm-btn" id="captionConfirm">Save photo</button>
      <button class="skip-btn" id="captionSkip">Skip</button>
    </div>
  </div>
</div>

<input type="file" id="photoInput" accept="image/*" style="display:none;" />

<div id="muteHint" style="position:fixed;bottom:84px;right:16px;z-index:99;background:#12121a;border:1px solid #1e1e2a;color:#6a6070;font-size:0.75rem;padding:8px 14px;border-radius:20px;opacity:0;transition:opacity 0.6s;pointer-events:none;font-family:'Inter',sans-serif;white-space:nowrap;">tap anywhere for music 🎵</div>
<audio id="bgMusic" loop preload="auto"><source src="music.mpeg" type="audio/mpeg"/></audio>
<button class="music-btn" id="musicBtn" title="Toggle music">🎵</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBX93664JrEUk3RNNnef7CYM9zJLnyk45w",
    authDomain: "quincy-c4e66.firebaseapp.com",
    projectId: "quincy-c4e66",
    storageBucket: "quincy-c4e66.firebasestorage.app",
    messagingSenderId: "993098619044",
    appId: "1:993098619044:web:ef1ef2412d711f6e3dae31"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ── Starfield ──
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 100; i++) {
    const s = document.createElement('div'); s.className='star';
    const sz=Math.random()*2+0.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${Math.random()*4+2}s;--o:${Math.random()*0.6+0.2};animation-delay:${Math.random()*6}s`;
    starsEl.appendChild(s);
  }

  // ── Photo grid ──
  let pendingBase64 = null;
  let photoCount = 0;

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  }

  function compressImage(file, maxWidth, quality, callback) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const scale = Math.min(1, maxWidth / img.width);
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        callback(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function injectPhoto(base64, docId, caption, addedAt) {
    const grid = document.getElementById('photoGrid');
    const addCard = document.getElementById('addCard');
    document.getElementById('emptyState').style.display = 'none';

    const item = document.createElement('div');
    item.className = 'photo-item';
    item.dataset.id = docId;

    const del = document.createElement('button');
    del.className = 'photo-delete';
    del.textContent = '✕';
    del.title = 'Remove photo';
    del.onclick = async () => {
      if (!confirm('Remove this photo?')) return;
      try {
        await deleteDoc(doc(db, 'photos', docId));
        item.style.transition = 'opacity 0.4s,transform 0.4s';
        item.style.opacity = '0'; item.style.transform = 'scale(0.9)';
        setTimeout(() => { item.remove(); photoCount--; checkEmpty(); }, 400);
      } catch(e) { console.error(e); }
    };

    const img = document.createElement('img');
    img.src = base64; img.alt = 'Gallery photo';

    const cap = document.createElement('div');
    cap.className = 'photo-caption';
    cap.textContent = caption || 'your addition 🌙';

    const date = document.createElement('div');
    date.className = 'photo-date';
    date.textContent = addedAt ? formatDate(addedAt) : '';

    item.appendChild(del);
    item.appendChild(img);
    item.appendChild(cap);
    item.appendChild(date);
    grid.insertBefore(item, addCard);
    photoCount++;
  }

  function checkEmpty() {
    document.getElementById('emptyState').style.display = photoCount === 0 ? 'block' : 'none';
  }

  async function savePhoto(caption) {
    const addCard = document.getElementById('addCard');
    addCard.querySelector('.add-label').textContent = 'saving... 🌙';
    try {
      const now = new Date().toISOString();
      const docRef = await addDoc(collection(db, 'photos'), {
        image: pendingBase64,
        caption: caption || 'your addition 🌙',
        addedAt: now
      });
      injectPhoto(pendingBase64, docRef.id, caption, now);
      pendingBase64 = null;
      document.getElementById('photoInput').value = '';
      addCard.querySelector('.add-label').textContent = 'add a photo';
    } catch(e) {
      console.error(e);
      addCard.querySelector('.add-label').textContent = 'try again 🌙';
    }
  }

  async function loadPhotos() {
    try {
      const q = query(collection(db, 'photos'), orderBy('addedAt', 'asc'));
      const snap = await getDocs(q);
      snap.forEach(d => injectPhoto(d.data().image, d.id, d.data().caption, d.data().addedAt));
      checkEmpty();
    } catch(e) { console.error(e); }
  }

  loadPhotos();

  // ── Events ──
  document.getElementById('addCard').addEventListener('click', () => document.getElementById('photoInput').click());
  document.getElementById('photoInput').addEventListener('change', e => {
    const file = e.target.files[0]; if (!file) return;
    compressImage(file, 800, 0.75, base64 => {
      pendingBase64 = base64;
      document.getElementById('captionInput').value = '';
      document.getElementById('captionModal').classList.add('open');
      document.getElementById('captionInput').focus();
    });
  });
  document.getElementById('captionConfirm').addEventListener('click', () => {
    const cap = document.getElementById('captionInput').value.trim();
    document.getElementById('captionModal').classList.remove('open');
    savePhoto(cap);
  });
  document.getElementById('captionSkip').addEventListener('click', () => {
    document.getElementById('captionModal').classList.remove('open');
    savePhoto('');
  });
  document.getElementById('captionModal').addEventListener('click', e => {
    if (e.target === document.getElementById('captionModal')) {
      document.getElementById('captionModal').classList.remove('open');
      savePhoto('');
    }
  });

  // ── Music ──
  const audio = document.getElementById('bgMusic');
  const musicBtn = document.getElementById('musicBtn');
  let userPaused = false;

  function fadeVol(from, to, ms, cb) {
    audio.volume = from;
    const steps=50, dt=ms/steps, diff=(to-from)/steps; let cur=from;
    const iv=setInterval(()=>{ cur+=diff; audio.volume=Math.min(1,Math.max(0,cur));
      if((diff>0&&cur>=to)||(diff<0&&cur<=to)){clearInterval(iv);if(cb)cb();} },dt);
  }
  function startMusic() {
    audio.volume=0;
    audio.play().then(()=>{ musicBtn.classList.add('playing');musicBtn.textContent='🔊';
      document.getElementById('muteHint').style.opacity='0'; fadeVol(0,0.15,4000);
    }).catch(()=>{ document.getElementById('muteHint').style.opacity='1'; });
  }
  function toggleMusic() {
    if(audio.paused){ userPaused=false; startMusic(); }
    else { userPaused=true; fadeVol(audio.volume,0,800,()=>{ audio.pause(); musicBtn.classList.remove('playing'); musicBtn.textContent='🎵'; }); }
  }
  window.addEventListener('load', startMusic);
  document.addEventListener('click', function fc(){ if(audio.paused&&!userPaused) startMusic(); document.removeEventListener('click',fc); },{once:true});
  document.getElementById('musicBtn').addEventListener('click', toggleMusic);
</script>
</body>
</html>
